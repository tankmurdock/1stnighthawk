<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1st Nighthawk Innovations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  .bg-vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
    z-index: 0; pointer-events: none;
  }

  .grid-overlay {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0, 200, 255, 0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 200, 255, 0.012) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0; pointer-events: none;
    opacity: 0;
    animation: fadeIn 2s ease forwards 3s;
  }

  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .particle {
    position: absolute;
    background: rgba(0, 200, 255, 0.4);
    border-radius: 50%;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 1; transform: translateY(90vh) translateX(5px) scale(1); }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(40px) scale(0.3); opacity: 0; }
  }

  .logo-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    z-index: 2;
  }

  .hawk-stage {
    position: relative;
    width: 340px;
    height: 340px;
  }

  .energy-ring {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px solid rgba(0, 200, 255, 0.05);
    opacity: 0;
    animation: ringPulse 4s ease-in-out infinite 2.8s;
  }
  .energy-ring:nth-child(2) { inset: -55px; animation-delay: 3.2s; }
  .energy-ring:nth-child(3) { inset: -80px; animation-delay: 3.6s; }

  @keyframes ringPulse {
    0%, 100% { opacity: 0; transform: scale(0.97); }
    50% { opacity: 1; transform: scale(1.02); }
  }

  .hawk-glow-deep {
    position: absolute;
    width: 250px; height: 250px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(0, 200, 255, 0.12) 0%, transparent 70%);
    filter: blur(60px);
    opacity: 0;
    animation: glowIn 2s ease forwards 1.8s, ambientPulse 4s ease-in-out infinite 3.5s;
    pointer-events: none;
  }

  @keyframes glowIn { to { opacity: 1; } }
  @keyframes ambientPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  .eye-glow-left, .eye-glow-right {
    position: absolute;
    width: 40px; height: 20px;
    background: radial-gradient(ellipse, rgba(0, 200, 255, 0.9) 0%, rgba(0, 120, 255, 0.4) 40%, transparent 70%);
    filter: blur(12px);
    opacity: 0;
    z-index: 5;
    animation: eyeFlash 0.6s ease forwards 2.2s, eyeBreathe 3s ease-in-out infinite 2.8s;
  }
  .eye-glow-left  { top: 42.5%; left: 28%; transform: rotate(-5deg); }
  .eye-glow-right { top: 42.5%; left: 55%; transform: rotate(5deg); }

  @keyframes eyeFlash {
    0% { opacity: 0; filter: blur(20px); }
    40% { opacity: 1; filter: blur(6px); }
    70% { opacity: 0.7; filter: blur(14px); }
    100% { opacity: 0.85; filter: blur(12px); }
  }

  @keyframes eyeBreathe {
    0%, 100% { opacity: 0.7; filter: blur(12px); }
    50% { opacity: 1; filter: blur(8px); }
  }

  .eye-flare-left, .eye-flare-right {
    position: absolute;
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.7), transparent);
    filter: blur(2px);
    opacity: 0;
    z-index: 5;
    animation: flareIn 0.8s ease forwards 2.4s;
  }
  .eye-flare-left  { top: 43.5%; left: 18%; }
  .eye-flare-right { top: 43.5%; left: 50%; }

  @keyframes flareIn {
    0% { opacity: 0; transform: scaleX(0); }
    50% { opacity: 1; transform: scaleX(1.2); }
    100% { opacity: 0.5; transform: scaleX(1); }
  }

  .hawk-image {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    z-index: 4;
    opacity: 0;
    transform: scale(1.08);
    filter: brightness(0) saturate(0);
    animation: hawkReveal 2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.5s;
  }

  @keyframes hawkReveal {
    0%   { opacity: 0; transform: scale(1.08); filter: brightness(0) saturate(0); }
    30%  { opacity: 0.6; filter: brightness(0.5) saturate(0); }
    60%  { opacity: 0.9; filter: brightness(0.9) saturate(0.5); }
    100% { opacity: 1; transform: scale(1); filter: brightness(1) saturate(1); }
  }

  .hawk-edge-highlight {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    z-index: 5;
    mix-blend-mode: screen;
    opacity: 0;
    filter: contrast(2) brightness(0.4);
    animation: edgeFade 1.5s ease forwards 2s;
    pointer-events: none;
  }

  @keyframes edgeFade { to { opacity: 0.15; } }

  .scan-line {
    position: absolute;
    top: 0; left: 5%; right: 5%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.5), rgba(0, 200, 255, 0.7), rgba(0, 200, 255, 0.5), transparent);
    z-index: 6;
    opacity: 0;
    animation: scanDown 5s ease-in-out infinite 3.5s;
    pointer-events: none;
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
  }

  @keyframes scanDown {
    0%   { top: 5%; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 95%; opacity: 0; }
  }

  .holo-noise {
    position: absolute;
    inset: 0;
    z-index: 7;
    opacity: 0;
    mix-blend-mode: overlay;
    pointer-events: none;
    animation: noiseIn 1s ease forwards 2.5s;
  }

  @keyframes noiseIn { to { opacity: 0.03; } }

  .brand-text {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .brand-first {
    font-family: 'Orbitron', sans-serif;
    font-weight: 400;
    font-size: 15px;
    letter-spacing: 18px;
    text-transform: uppercase;
    color: #00c8ff;
    margin-bottom: 6px;
    opacity: 0;
    animation: textUp 0.8s ease forwards 2.6s;
    transform: translateY(12px);
    text-shadow: 0 0 30px rgba(0, 200, 255, 0.5), 0 0 60px rgba(0, 200, 255, 0.2);
  }

  .brand-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: 10px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #e4e4e7 0%, #71717a 35%, #00c8ff 55%, #a1a1aa 75%, #e4e4e7 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transform: translateY(12px);
    animation: textUp 1s ease forwards 2.8s, shimmer 8s linear infinite 3.8s;
  }

  .divider-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #00c8ff, transparent);
    margin: 8px auto;
    animation: lineExpand 1.2s ease forwards 3.0s;
  }

  .brand-sub {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 14px;
    text-transform: uppercase;
    color: #52525b;
    margin-top: 6px;
    opacity: 0;
    transform: translateY(12px);
    animation: textUp 0.8s ease forwards 3.2s;
  }

  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #3f3f46;
    margin-top: 16px;
    opacity: 0;
    animation: textUp 0.8s ease forwards 3.5s;
    transform: translateY(12px);
  }

  @keyframes textUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer { to { background-position: 300% center; } }
  @keyframes lineExpand { to { width: 320px; } }
  @keyframes fadeIn { to { opacity: 1; } }

  .corner {
    position: fixed; width: 50px; height: 50px; z-index: 1;
    opacity: 0; animation: fadeIn 0.6s ease forwards 3.4s;
  }
  .corner.tl { top: 24px; left: 24px; border-top: 1px solid #00c8ff22; border-left: 1px solid #00c8ff22; }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid #00c8ff22; border-right: 1px solid #00c8ff22; }
  .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid #00c8ff22; border-left: 1px solid #00c8ff22; }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid #00c8ff22; border-right: 1px solid #00c8ff22; }

  .hud-label {
    position: fixed;
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: #27272a;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 3.6s;
  }
  .hud-label.top-left { top: 28px; left: 84px; }
  .hud-label.top-right { top: 28px; right: 84px; }
  .hud-label.bot-left { bottom: 28px; left: 84px; }

  .replay-btn {
    position: fixed; bottom: 28px; right: 84px;
    font-family: 'Rajdhani', sans-serif; font-size: 11px;
    letter-spacing: 4px; text-transform: uppercase;
    color: #3f3f46; background: none;
    border: 1px solid #1a1a1e; padding: 7px 18px;
    cursor: pointer; z-index: 10;
    transition: all 0.3s ease;
    opacity: 0; animation: fadeIn 0.5s ease forwards 3.8s;
  }
  .replay-btn:hover {
    color: #00c8ff; border-color: #00c8ff33;
    box-shadow: 0 0 25px rgba(0, 200, 255, 0.08);
  }

  .logo-container:hover .hawk-image {
    filter: brightness(1.08) saturate(1.1);
    transition: filter 0.5s ease;
  }
  .logo-container:hover .eye-glow-left,
  .logo-container:hover .eye-glow-right {
    filter: blur(8px) brightness(1.3);
    transition: filter 0.3s ease;
  }
</style>
</head>

<div class="bg-vignette"></div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<span class="hud-label top-left">sys:online</span>
<span class="hud-label top-right">ui/ux · dev</span>
<span class="hud-label bot-left">v1.0.0</span>

<div class="logo-container" id="logoContainer">
  <div class="hawk-stage">
    <div class="energy-ring"></div>
    <div class="energy-ring"></div>
    <div class="energy-ring"></div>
    <div class="hawk-glow-deep"></div>

    <img id="hawkImg" alt="Nighthawk" class="hawk-image" />
    <img id="hawkEdge" alt="" class="hawk-edge-highlight" aria-hidden="true" />

    <div class="eye-glow-left"></div>
    <div class="eye-glow-right"></div>
    <div class="eye-flare-left"></div>
    <div class="eye-flare-right"></div>

    <div class="scan-line"></div>
    <canvas class="holo-noise" id="noiseCanvas" width="340" height="340"></canvas>
  </div>

  <div class="brand-text">
    <div class="brand-first">1 s t</div>
    <div class="brand-name">Nighthawk</div>
    <div class="divider-line"></div>
    <div class="brand-sub">Innovations</div>
    <div class="tagline">Precision UI · Fearless UX</div>
  </div>
</div>

<button class="replay-btn" onclick="replay()">↻ Replay</button>

  document.getElementById('hawkImg').src = HAWK_DATA;
  document.getElementById('hawkEdge').src = HAWK_DATA;

  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (10 + Math.random() * 15) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    const size = 1 + Math.random() * 2;
    p.style.width = p.style.height = size + 'px';
    p.style.opacity = 0.1 + Math.random() * 0.25;
    pc.appendChild(p);
  }

  // Noise Canvas
  const canvas = document.getElementById('noiseCanvas');
  const ctx = canvas.getContext('2d');

  function drawNoise() {
    const imageData = ctx.createImageData(canvas.width, canvas.height);
    for (let i = 0; i < imageData.data.length; i += 4) {
      const v = Math.random() * 255;
      imageData.data[i] = v;
      imageData.data[i+1] = v;
      imageData.data[i+2] = v;
      imageData.data[i+3] = 15;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  let noiseInterval;
  setTimeout(() => {
    drawNoise();
    noiseInterval = setInterval(drawNoise, 120);
  }, 2500);

  // Parallax
  document.addEventListener('mousemove', (e) => {
    const c = document.getElementById('logoContainer');
    if (!c) return;
    const r = c.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = (e.clientX - cx) / 50;
    const dy = (e.clientY - cy) / 50;
    c.style.transform = `translate(${dx}px, ${dy}px)`;
  });

  // Replay
  function replay() {
    clearInterval(noiseInterval);
    const c = document.getElementById('logoContainer');
    const clone = c.cloneNode(true);
    c.parentNode.replaceChild(clone, c);
    clone.id = 'logoContainer';

    clone.querySelector('#hawkImg').src = HAWK_DATA;
    clone.querySelector('#hawkEdge').src = HAWK_DATA;

    const nc = clone.querySelector('#noiseCanvas');
    if (nc) {
      const nctx = nc.getContext('2d');
      setTimeout(() => {
        function dn() {
          const id = nctx.createImageData(340, 340);
          for (let i = 0; i < id.data.length; i += 4) {
            const v = Math.random() * 255;
            id.data[i] = v; id.data[i+1] = v; id.data[i+2] = v; id.data[i+3] = 15;
          }
          nctx.putImageData(id, 0, 0);
        }
        dn();
        noiseInterval = setInterval(dn, 120);
      }, 2500);
    }
  }
